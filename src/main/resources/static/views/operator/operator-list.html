<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operator Planning</title>
    <link rel="stylesheet" href="../../styles/operator/operatorList.css">
</head>
<body>
<header class="dashboard-shell-wrapper-header">
    <div class="dashboard-shell-inner-header">
        <div class="dashboard-shell-group-header">
            <div class="dashboard-shell-brand">
                <img class="dashboard-shell-logo" src="https://images.unsplash.com/photo-1586528116311-ad8dd3c8310d?w=100" alt="Logo">
            </div>
        </div>
    </div>
</header>

<div class="operator-shell">
    <div class="operator-shell-wrapper-header">
        <div class="operator-shell-inner-header">
            <div class="operator-shell-group-header">
                <div class="operator-shell-section-header">
                    <input id="search" type="text" placeholder="Search by operator name" max="25">
                    <button class="search-btn">Search</button>
                </div>
            </div>
        </div>
        <div class="operator-shell-inner-header">
            <button class="create-operator-btn">Create operator</button>
        </div>
    </div>
    <div class="operator-shell-wrapper-body">

    </div>
</div>
<script src="/js/viewStateConfig.js"></script>
<script src="../../js/utility/utility.js"></script>
<script src="../../js/ajaxCalls/ajaxCalls.js"></script>
<script src="../../js/operator/operatorList.js"></script>
</body>
</html>
