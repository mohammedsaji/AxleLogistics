<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Operator screen</title>
</head>
<body>
<div class="operator">
    <header class="operator-header">
        <div class="operator-header-brand-icon">
            <img class="operator-header-logo"  src="" alt="Operator Logo">
        </div>
        <div class="operator-header-actions">
            <div class="operator-header-section-a">
                <button id="dashboard-btn">Dashboard</button>
            </div>
            <div class="operator-header-section-b">
                <div class="operator-header-actions-a">
                    <button id="operator-list-btn">Operator list</button>
                    <button id="entry-operator-btn">Entry operator</button>
                    <button id="entry-vehicle-btn">Entry vehicle</button>
                </div>
                <div class="operator-header-actions-b">
                    <button class="entry-manager-btn">Entry manager</button>
                    <button class="entry-driver-btn">Entry driver</button>
                </div>
            </div>
        </div>
    </header>
    <main class="operator-body">
        <div class="operator-body-operator-display">
            <form>
                <label for="operator-id">Operator ID :</label>
                <input id="operator-id" type="text" readonly>

                <label for="operator-name">Operator Name :</label>
                <input id="operator-name" type="text" maxlength="250" required>

                <label for="operator-transport-type">Transportation Mode :</label>
                <input id="operator-transport-type" readonly>

                <label for="operator-manager">Operator Manager ID :</label>
                <input id="operator-manager" type="number" readonly required>

                <label for="operator-created-at">Operator created at :</label>
                <input id="operator-created-at" type="datetime-local" readonly required>

                <label for="operator-updated-at">Operator updated at :</label>
                <input id="operator-updated-at" type="datetime-local" readonly required>

                <label for="operator-updated-by">Operator Manager ID :</label>
                <input id="operator-updated-by" type="number" readonly required>
            </form>
            <div class="operator-body-dependents-list">
                <button id="view-managers-btn">View Managers</button>
                <button id="view-drivers-btn">View drivers</button>
                <button id="view-vehicles-btn">View vehicles</button>
            </div>
        </div>
        <div class="operator-body-operator-actions">
            <button id="update-btn">Update</button>
            <button id="delete-btn">Delete</button>
        </div>
        <div class="operator-body-common-actions">
            <button id="proceed-btn">Proceed</button>
        </div>
    </main>
    <footer class="operator-footer">

    </footer>
</div>
