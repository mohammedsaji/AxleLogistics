<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vehicle Planning</title>
</head>
<body>
<div class="vehicle-shell">
    <div class="vehicle-shell-wrapper-header">
        <div class="vehicle-shell-inner-header">
            <div class="vehicle-shell-group-header">
                <button class="previous-form-btn">Previous form</button>
            </div>
            <div class="vehicle-shell-group-header">
                <div class="vehicle-shell-section-header">
                    <input id="search" type="text" placeholder="Search by vehicle name" max="25">
                </div>
                <div class="vehicle-shell-section-header">
                    <button class="search-btn">Search</button>
                </div>
            </div>
        </div>
        <div class="vehicle-shell-inner-header">
            <button class="create-vehicle-btn">Create vehicle</button>
        </div>
    </div>
    <div class="vehicle-shell-wrapper-pager">
        <div class="vehicle-shell-inner-pager">
            <button class="previous-page-btn">Previous page</button>
            <button class="next-page-btn">Next page</button>
        </div>
    </div>
    <div class="vehicle-shell-wrapper-body">

    </div>
</div>
</body>
<script src="/js/viewStateConfig.js"></script>
<script src="/js/utility/utility.js"></script>
<script src="/js/ajaxCalls/ajaxCalls.js"></script>
<script src="/js/vehicle/vehicleList.js"></script>
</html>
