<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Shipment List</title>
</head>
<body>
<div class="shipment-shell">
    <div class="shipment-shell-wrapper-header">
        <div class="shipment-shell-inner-header">
            <div class="shipment-shell-group-header">
                <button class="previous-form-btn">Previous form</button>
            </div>
            <div class="shipment-shell-group-header">
                <div class="shipment-shell-section-header">
                    <input id="search" type="text" placeholder="Search by shipment name" max="25">
                </div>
                <div class="shipment-shell-section-header">
                    <button class="search-btn">Search</button>
                </div>
            </div>
        </div>
        <div class="shipment-shell-inner-header">
            <button class="create-shipment-btn">Create shipment</button>
        </div>
    </div>
    <div class="shipment-shell-wrapper-pager">
        <div class="shipment-shell-inner-pager">
            <button class="previous-page-btn">Previous page</button>
            <button class="next-page-btn">Next page</button>
        </div>
    </div>
    <div class="shipment-shell-wrapper-body">

    </div>
</div>
<script src="/js/viewStateConfig.js"></script>
<script src="../../js/utility/utility.js"></script>
<script src="../../js/ajaxCalls/ajaxCalls.js"></script>
<script src="../../js/shipment/shipmentList.js"></script>
</body>
</html>
