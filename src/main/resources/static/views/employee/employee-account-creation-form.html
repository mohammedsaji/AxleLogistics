<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Employee form</title>
</head>
<body>
<div class="employee-shell">
    <div class="employee-shell-wrapper-form">
        <div class="employee-shell-group-header">
            <button class="previous-form-btn">Previous form</button>
        </div>
        <div class="employee-shell-wrapper-body">
            <form id="employee-shell-group-body">
                <h2>SIGN UP</h2>

                <label for="employee-name">Employee Name : </label><input type="text" id="employee-name" placeholder="Username" maxlength="250" required>
                <label for="employee-phone-no">Employee Phone no :</label><input type="number" id="employee-phone-no" placeholder="Phone no" maxlength="25" required>
                <label for="employee-department">Employee Department :</label><input type="text" id="employee-department" placeholder="Department" maxlength="30" required>
                <label for="employee-status">Employee Status :</label>
                <select id="employee-status" required>
                    <option value="">Select</option>
                    <option value="ACTIVE">ACTIVE</option>
                    <option value="IN_ACTIVE">IN_ACTIVE</option>
                </select>

                <button type="submit" class="employee-creation-btn">SUBMIT</button>
            </form>
        </div>
    </div>
</div>
<script src="/js/viewStateConfig.js"></script>
<script src="../../js/utility/utility.js"></script>
<script src="../../js/ajaxCalls/ajaxCalls.js"></script>
<script src="../../js/employee/employeeAccountCreationForm.js"></script>
</body>
</html>
