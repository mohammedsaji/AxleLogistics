<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Driver screen</title>
    <link rel="stylesheet" href="../../styles/driver/driver.css">
</head>
<body>
<div class="driver-shell">
    <div class="driver-shell-wrapper-header">
        <div class="axle-os-shell-inner-header">
            <div class="axle-os-shell-logo-container">
                <img src="" alt="AxleOS">
            </div>
        </div>
    </div>
    <div class="driver-shell-wrapper-header">
        <div class="driver-shell-inner-header">
            <div class="driver-shell-group-header">
                <button class="dashboard-btn">Dashboard</button>
                <button class="previous-form-btn">Previous form</button>
            </div>
            <div class="driver-shell-group-header">
                <button class="create-driver-btn">Create driver</button>
                <button class="update-driver-btn">Update driver</button>
                <button class="delete-driver-btn">Delete driver</button>
            </div>
        </div>

    </div>
    <div class="driver-shell-wrapper-body">

    </div>
